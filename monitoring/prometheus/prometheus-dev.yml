global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: hr-project
    env: dev

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # En dev : le backend Spring Boot tourne en dehors de Docker
  # host.docker.internal = l'hôte Docker (Windows/Mac)
  # Sur Linux : remplacer par l'IP de l'interface docker0 (ex: 172.17.0.1)
  - job_name: hr-backend
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: hr-backend
          layer: api

  - job_name: hr-iam
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          service: hr-iam
          layer: security
