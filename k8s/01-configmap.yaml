apiVersion: v1
kind: ConfigMap
metadata:
  name: hr-backend-config
  namespace: hr-project
  labels:
    app: hr-backend
data:
  # ── Base de données ─────────────────────────────────────────────────────────
  # DNS interne K8s : <release-helm>-postgresql.<namespace>.svc.cluster.local
  DB_URL: "jdbc:postgresql://hr-postgres-postgresql.hr-project.svc.cluster.local:5432/hr_db"

  # ── Kafka ────────────────────────────────────────────────────────────────────
  # DNS interne K8s : <release-helm>.<namespace>.svc.cluster.local
  KAFKA_BOOTSTRAP_SERVERS: "host.docker.internal:9092"

  # ── JWT ──────────────────────────────────────────────────────────────────────
  JWT_EXPIRATION: "3600000"

  # ── Spring ───────────────────────────────────────────────────────────────────
  SPRING_PROFILES_ACTIVE: "prod"

  # ── Google Vertex AI ─────────────────────────────────────────────────────────
  # Override des valeurs hardcodées dans application.yaml via env vars Spring Boot
  SPRING_AI_VERTEX_AI_GEMINI_PROJECT_ID: "gen-lang-client-0640135018"
  SPRING_AI_VERTEX_AI_GEMINI_LOCATION: "us-central1"
  # Le fichier JSON est monté en volume depuis le Secret gcp-credentials
  GOOGLE_APPLICATION_CREDENTIALS: "/app/secrets/gcp-key.json"
