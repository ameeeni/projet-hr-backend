apiVersion: v1
kind: Secret
metadata:
  name: hr-backend-secret
  namespace: hr-project
  labels:
    app: hr-backend
# stringData : Kubernetes encode automatiquement en base64 à l'apply.
# Avantage : lisible et pas besoin d'encoder manuellement.
# NE PAS committer ce fichier avec de vraies valeurs dans Git.
# Utiliser à la place : kubectl create secret generic ou un gestionnaire de secrets (Vault, Sealed Secrets).
type: Opaque
stringData:
  JWT_SECRET: "REMPLACER_PAR_UNE_CLE_BASE64_256_BITS"
  DB_USERNAME: "hr_user"
  DB_PASSWORD: "REMPLACER_PAR_MOT_DE_PASSE_FORT"

# ─── Secret GCP (à créer séparément depuis le fichier JSON) ──────────────────
# Ne PAS mettre le contenu du fichier gcp-key.json ici.
# Créer le secret avec la commande suivante :
#
#   kubectl create secret generic gcp-credentials \
#     --from-file=gcp-key.json=./gcp-key.json \
#     --namespace hr-project
#
# Cela crée un secret nommé "gcp-credentials" avec une clé "gcp-key.json".
