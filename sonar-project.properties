# ─── SonarQube — Backend Spring Boot ──────────────────────────────────────────
sonar.projectKey=hr-project-backend
sonar.projectName=HR Project Backend
sonar.projectVersion=0.0.1-SNAPSHOT

# URL du serveur SonarQube (local par défaut ; remplacer par SonarCloud URL si besoin)
sonar.host.url=http://localhost:9000
# sonar.token=<TOKEN>   # à passer en variable d'environnement : SONAR_TOKEN

# Sources et tests
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Couverture JaCoCo (XML généré par mvn verify)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.java.coveragePlugin=jacoco

# Exclusions (DTOs, entités, events, mappers générés — pas de logique métier)
sonar.exclusions=\
  **/dto/**,\
  **/entities/**,\
  **/events/**,\
  **/*MapperImpl.java,\
  **/HrProjectBackendApplication.java,\
  **/config/**

sonar.coverage.exclusions=\
  **/dto/**,\
  **/entities/**,\
  **/events/**,\
  **/*MapperImpl.java,\
  **/HrProjectBackendApplication.java,\
  **/config/**

sonar.sourceEncoding=UTF-8
