# ─── JWT (partagé avec le service IAM) ───────────────────────────────────────
jwt:
  # En prod : définir JWT_SECRET comme variable d'environnement (clé Base64, min 256 bits)
  secret: ${JWT_SECRET:c29tZS1zZWNyZXQta2V5LWZvci1kZXYtZW52aXJvbm1lbnQtaGVyZS0xMjM0}
  expiration: ${JWT_EXPIRATION:3600000}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: hr-backend
      environment: ${SPRING_PROFILES_ACTIVE:dev}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operationsSorter: method
    disable-swagger-default-url: true
  packages-to-scan: tn.iteam.hrprojectbackend.users.controller,tn.iteam.hrprojectbackend.leave.controller,tn.iteam.hrprojectbackend.dashboard.controller,tn.iteam.hrprojectbackend.chat.controller
  paths-to-match: /api/**
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

spring:
  ai:
    vertex:
      ai:
        gemini:
          project-id: gen-lang-client-0640135018
          location: us-central1
          chat:
            options:
              model: gemini-2.0-flash
              temperature: 0.2

    mcp:
      server:
        enabled: false
      client:
        enabled: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hr_db}
    username: ${DB_USERNAME:hr_user}
    password: ${DB_PASSWORD:hr_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

    consumer:
      group-id: hr-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
